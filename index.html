<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect, useRef } = React;

// ── Lucide icons
const L = window.lucide || {};
function Icon({ name, size = 16, className = "" }) {
  const el = useRef(null);
  useEffect(() => {
    if (el.current && L.createIcons) {
      el.current.innerHTML = `<i data-lucide="${name}" style="width:${size}px;height:${size}px;display:block;"></i>`;
      L.createIcons({ nodes: [el.current] });
    }
  }, [name, size]);
  return <span ref={el} className={"inline-flex items-center justify-center " + className} style={{width:size,height:size,flexShrink:0}}/>;
}
// Shorthand icon components
const Clock        = p => <Icon name="clock"          {...p}/>;
const WalletIco    = p => <Icon name="wallet"         {...p}/>;
const ChevLeft     = p => <Icon name="chevron-left"   {...p}/>;
const ChevRight    = p => <Icon name="chevron-right"  {...p}/>;
const TrendUp      = p => <Icon name="trending-up"    {...p}/>;
const TrendDown    = p => <Icon name="trending-down"  {...p}/>;
const CardIco      = p => <Icon name="credit-card"    {...p}/>;
const Undo         = p => <Icon name="undo-2"         {...p}/>;
const Redo         = p => <Icon name="redo-2"         {...p}/>;
const LogOutIco    = p => <Icon name="log-out"        {...p}/>;
const ShieldIco    = p => <Icon name="shield-check"   {...p}/>;
const PlusIco      = p => <Icon name="plus"           {...p}/>;
const XIco         = p => <Icon name="x"              {...p}/>;
const TrashIco     = p => <Icon name="trash-2"        {...p}/>;
const PinIco       = p => <Icon name="pin"            {...p}/>;
const PinOffIco    = p => <Icon name="pin-off"        {...p}/>;
const ScanIco      = p => <Icon name="scan-line"      {...p}/>;
const PaletteIco   = p => <Icon name="palette"        {...p}/>;
const CoffeeIco    = p => <Icon name="coffee"         {...p}/>;

// ── Helpers
const MONTHS  = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const WSHORT  = ["DOM","SEG","TER","QUA","QUI","SEX","SAB"];
const WFULL   = ["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];

function pad(n){ return String(n).padStart(2,"0"); }
function dkey(y,m,d){ return `${y}-${pad(m+1)}-${pad(d)}`; }
function mkey(y,m){ return `${y}-${pad(m+1)}`; }
function dim(y,m){ return new Date(y,m+1,0).getDate(); }
function wd1(y,m){ return new Date(y,m,1).getDay(); }
function toMin(t){ if(!t) return null; const [h,m]=t.split(":").map(Number); return h*60+m; }
function fmtHM(mins){
  if(mins==null) return "-";
  const sign=mins<0?"-":""; mins=Math.abs(Math.round(mins));
  return `${sign}${Math.floor(mins/60)}h${pad(mins%60)}m`;
}
function fmtBRL(v){ return Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"}); }

const FULL_DAY=480, SAT_DAY=240;
let uid=0; const newId=()=>`i${++uid}`;

// ── Persistence (localStorage fallback + window.storage if available)
const SK="pf-v4";
async function loadSt(){
  try{
    if(window.storage){ const r=await window.storage.get(SK,false); return r?.value?JSON.parse(r.value):null; }
    const v=localStorage.getItem(SK); return v?JSON.parse(v):null;
  }catch{ return null; }
}
async function saveSt(s){
  try{
    const str=JSON.stringify(s);
    if(window.storage) await window.storage.set(SK,str,false);
    else localStorage.setItem(SK,str);
  }catch{}
}

// ── Default finance sections
function defSections(){
  return [
    { id:"income", title:"Entradas",          color:"#34d399", kind:"income",  pin:false, items:[{id:newId(),label:"Salário",value:0}] },
    { id:"invest", title:"Investimentos",      color:"#22d3ee", kind:"expense", pin:false, items:[{id:newId(),label:"Poupança",value:0}] },
    { id:"varexp", title:"Despesas Variáveis", color:"#fb923c", kind:"expense", pin:false, items:[{id:newId(),label:"Item",value:0}] },
    { id:"fixed",  title:"Despesas Fixas",     color:"#f87171", kind:"fixed",   pin:false, items:[{id:newId(),label:"Aluguel",value:0}] },
    { id:"card",   title:"Gastos em Cartões",  color:"#a78bfa", kind:"card",    pin:false, items:[{id:newId(),label:"Nubank",value:0}] },
  ];
}

// ── OCR via Anthropic API
async function readPontoFromImage(dataUrl){
  const base64=dataUrl.split(",")[1];
  const mtype=dataUrl.split(";")[0].split(":")[1]||"image/jpeg";
  const body={
    model:"claude-sonnet-4-6", max_tokens:200,
    messages:[{ role:"user", content:[
      { type:"image", source:{ type:"base64", media_type:mtype, data:base64 } },
      { type:"text", text:`Você é o motor de extração de dados (OCR inteligente) de um aplicativo de controle de ponto. Sua tarefa é ler o texto desta foto de um comprovante de ponto impresso e registrar o momento exato da marcação.

Objetivo: Identificar e extrair estritamente a data e a hora em que o ponto foi batido.

Regras:
- Data: Localize a data do registro do ponto. Formate como DD/MM/YYYY.
- Hora: Localize o horário exato da batida no formato HH:MM (24h). Ignore segundos.
- Filtro de Ruído: Ignore CNPJ, PIS/CPF, NSR, NF, números de série, hashes e qualquer outro código alfanumérico longo. Foque APENAS na linha que contém a data e hora do evento de ponto.
- Se não conseguir identificar com certeza a data ou hora, retorne null para o campo.

Responda SOMENTE com JSON puro, sem texto extra, sem markdown:
{"date":"DD/MM/YYYY","time":"HH:MM"}` }
    ]}]
  };
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify(body)
  });
  if(!res.ok){ const e=await res.text().catch(()=>""); throw new Error(`API ${res.status}: ${e.slice(0,120)}`); }
  const data=await res.json();
  const text=data.content?.find(b=>b.type==="text")?.text||"";
  const match=text.match(/\{[\s\S]*?\}/);
  if(!match) throw new Error("Sem JSON: "+text.slice(0,80));
  return JSON.parse(match[0]);
}

// ════════════ APP ════════════════════════════════════════════════════════
function App(){
  const [ready,setReady]=useState(false);
  const [user,setUser]=useState(null);
  const [dayData,setDayDataRaw]=useState({});
  const [overtime,setOvertime]=useState(15.55);
  const [finData,setFinDataRaw]=useState({});
  const [globalPin,setGlobalPin]=useState(null);
  const hist=useRef([]); const fut=useRef([]); const skip=useRef(false);

  function snap(){ return {dayData,overtime,finData,globalPin}; }
  function pushH(){ if(skip.current) return; hist.current.push(snap()); if(hist.current.length>60) hist.current.shift(); fut.current=[]; }
  function applySnap(s){ skip.current=true; setDayDataRaw(s.dayData); setOvertime(s.overtime); setFinDataRaw(s.finData); setGlobalPin(s.globalPin); skip.current=false; }
  function undo(){ const p=hist.current.pop(); if(!p) return; fut.current.push(snap()); applySnap(p); }
  function redo(){ const n=fut.current.pop(); if(!n) return; hist.current.push(snap()); applySnap(n); }

  function setDayData(u){ pushH(); setDayDataRaw(typeof u==="function"?u:()=>u); }
  function setFinData(u){ pushH(); setFinDataRaw(typeof u==="function"?u:()=>u); }
  function setOT(v){ pushH(); setOvertime(v); }
  function setGP(v){ pushH(); setGlobalPin(v); }

  useEffect(()=>{(async()=>{
    const s=await loadSt();
    if(s){
      if(s.dayData)   setDayDataRaw(s.dayData);
      if(s.overtime)  setOvertime(s.overtime);
      if(s.finData)   setFinDataRaw(s.finData);
      if(s.globalPin) setGlobalPin(s.globalPin);
      if(s.loggedIn)  setUser({name:"Admin"});
    }
    setReady(true);
  })();},[]);

  useEffect(()=>{
    if(!ready) return;
    const t=setTimeout(()=>saveSt({dayData,overtime,finData,globalPin,loggedIn:!!user}),500);
    return()=>clearTimeout(t);
  },[dayData,overtime,finData,globalPin,user,ready]);

  const [tab,setTab]=useState("ponto");

  if(!ready) return (
    <div className="min-h-screen bg-[#111318] flex items-center justify-center">
      <Clock size={24} className="text-zinc-600"/>
    </div>
  );

  if(!user) return <LoginScreen onLogin={()=>setUser({name:"Admin"})}/>;

  return (
    <div className="min-h-screen bg-[#111318] text-zinc-100 pb-12">
      {/* Header */}
      <div className="sticky top-0 z-30 bg-[#111318] border-b border-zinc-800 px-4 pt-5 pb-3 flex items-center justify-between" style={{backgroundColor:"rgba(17,19,24,0.97)"}}>
        <div>
          <div className="text-base font-bold leading-none text-zinc-100">Ponto &amp; Finanças</div>
          <div className="text-xs text-zinc-500 mt-0.5 flex items-center gap-1">
            <ShieldIco size={10} className="text-emerald-400"/> Admin
          </div>
        </div>
        <div className="flex items-center gap-1.5">
          <div className="flex bg-zinc-900 border border-zinc-800 rounded-full p-0.5">
            <button onClick={undo} disabled={!hist.current.length}
              className="p-1.5 text-zinc-400 hover:text-white disabled:opacity-25 transition rounded-full">
              <Undo size={14}/>
            </button>
            <button onClick={redo} disabled={!fut.current.length}
              className="p-1.5 text-zinc-400 hover:text-white disabled:opacity-25 transition rounded-full">
              <Redo size={14}/>
            </button>
          </div>
          <div className="flex bg-zinc-900 border border-zinc-800 rounded-full p-0.5">
            <TabBtn active={tab==="ponto"}    onClick={()=>setTab("ponto")}    label="Ponto"    icon={<Clock size={12}/>}/>
            <TabBtn active={tab==="financas"} onClick={()=>setTab("financas")} label="Finanças" icon={<WalletIco size={12}/>}/>
          </div>
          <button onClick={()=>setUser(null)} className="p-2 rounded-full bg-zinc-900 border border-zinc-800 text-zinc-500 hover:text-white transition">
            <LogOutIco size={13}/>
          </button>
        </div>
      </div>

      {tab==="ponto"
        ? <PontoTab dayData={dayData} setDayData={setDayData} overtime={overtime} setOvertime={setOT}/>
        : <FinTab finData={finData} setFinData={setFinData} globalPin={globalPin} setGlobalPin={setGP}/>
      }
    </div>
  );
}

function TabBtn({active,onClick,label,icon}){
  return (
    <button onClick={onClick}
      className={`flex items-center gap-1 text-xs font-bold px-3 py-1.5 rounded-full transition ${active?"bg-white text-zinc-900":"text-zinc-500 hover:text-zinc-200"}`}>
      {icon}{label}
    </button>
  );
}

// ════════════ LOGIN ══════════════════════════════════════════════════════
function LoginScreen({onLogin}){
  return (
    <div className="min-h-screen flex items-center justify-center px-5 relative overflow-hidden bg-[#111318]">
      <div className="absolute -top-40 -left-20 w-80 h-80 rounded-full pointer-events-none" style={{background:"radial-gradient(circle,rgba(52,211,153,0.07),transparent)"}}/>
      <div className="absolute -bottom-40 -right-20 w-80 h-80 rounded-full pointer-events-none" style={{background:"radial-gradient(circle,rgba(34,211,238,0.07),transparent)"}}/>
      <div className="w-full max-w-xs relative flex flex-col items-center text-zinc-100">
        <div className="w-16 h-16 rounded-2xl bg-zinc-900 border border-zinc-800 flex items-center justify-center mb-5 relative">
          <Clock size={30} className="text-emerald-400"/>
          <div className="absolute -bottom-1.5 -right-1.5 w-6 h-6 rounded-full bg-zinc-950 border border-zinc-800 flex items-center justify-center">
            <WalletIco size={12} className="text-cyan-400"/>
          </div>
        </div>
        <h1 className="text-2xl font-extrabold text-white mb-1">Ponto &amp; Finanças</h1>
        <p className="text-xs text-zinc-500 mb-10">Controle de jornada e orçamento</p>
        <button onClick={onLogin}
          className="w-full bg-white text-zinc-900 font-extrabold text-base py-4 rounded-2xl hover:bg-zinc-100 active:scale-95 transition-all flex items-center justify-center gap-2 shadow-lg">
          <ShieldIco size={18} className="text-emerald-600"/> Entrar como Admin
        </button>
      </div>
    </div>
  );
}

// ════════════ PONTO TAB ══════════════════════════════════════════════════
function PontoTab({dayData,setDayData,overtime,setOvertime}){
  const today=new Date();
  const [year,setYear]=useState(today.getFullYear());
  const [month,setMonth]=useState(today.getMonth());
  const [editOT,setEditOT]=useState(false);
  const [scanning,setScanning]=useState(false);
  const [scanMsg,setScanMsg]=useState(null);
  const scanRef=useRef(null);

  const numDays=dim(year,month);
  const wd1st=wd1(year,month);
  const prevDim=dim(year,month===0?11:month-1);

  const cells=[];
  for(let i=0;i<wd1st;i++) cells.push({d:prevDim-wd1st+1+i,out:true});
  for(let d=1;d<=numDays;d++) cells.push({d,out:false});
  while(cells.length%7!==0) cells.push({d:cells.length-wd1st-numDays+1,out:true});

  function getDay(k){ return dayData[k]||{type:"normal",e:{}}; }
  function updDay(k,fn){ setDayData(p=>{ const cur=JSON.parse(JSON.stringify(p[k]||{type:"normal",e:{}})); return {...p,[k]:fn(cur)}; }); }
  function toggleType(k,t){ updDay(k,d=>{ d.type=d.type===t?"normal":t; return d; }); }
  function setT(k,f,v){ updDay(k,d=>{ d.e=d.e||{}; d.e[f]=v; return d; }); }

  function workedM(e,isSat){
    if(!e) return 0;
    if(isSat){ const a=toMin(e.entrada),b=toMin(e.saida); return(a!=null&&b!=null&&b>a)?b-a:0; }
    const a=toMin(e.entrada),b=toMin(e.saidaAlmoco),c=toMin(e.voltaAlmoco),d=toMin(e.saida);
    let t=0; if(a!=null&&b!=null&&b>a)t+=b-a; if(c!=null&&d!=null&&d>c)t+=d-c; return t;
  }
  function expM(isSat){ return isSat?SAT_DAY:FULL_DAY; }
  function otM(e,isSat){ return Math.max(0,workedM(e,isSat)-expM(isSat)); }
  function owedM(e,isSat){ const w=workedM(e,isSat); return w>0?Math.max(0,expM(isSat)-w):0; }
  function hasAny(e){ return !!(e&&(e.entrada||e.saidaAlmoco||e.voltaAlmoco||e.saida)); }

  function prevMon(){ if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1); }
  function nextMon(){ if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1); }

  const summ=useMemo(()=>{
    let worked=0,ot=0,owed=0,days=0;
    for(let d=1;d<=numDays;d++){
      const k=dkey(year,month,d),wk=new Date(year,month,d).getDay(),isSat=wk===6;
      const dd=dayData[k]; if(!dd||dd.type==="feriado"||dd.type==="folga"||wk===0) continue;
      const e=dd.e||{}; if(!hasAny(e)) continue;
      const w=workedM(e,isSat); worked+=w; ot+=otM(e,isSat); owed+=owedM(e,isSat); days++;
    }
    return{worked,ot,owed,days};
  },[dayData,year,month,numDays]);

  const otMon=(summ.ot/60)*overtime, owedMon=(summ.owed/60)*overtime;
  const balMin=summ.ot-summ.owed, balMon=(balMin/60)*overtime;

  function applyColor(color){
    setDayData(p=>{
      const n={...p};
      for(let d=1;d<=numDays;d++){
        const wk=new Date(year,month,d).getDay(); if(wk===0) continue;
        const k=dkey(year,month,d);
        n[k]={...JSON.parse(JSON.stringify(n[k]||{type:"normal",e:{}})),color};
      }
      return n;
    });
  }

  async function handleScanFile(e){
    const file=e.target.files?.[0]; if(!file) return;
    setScanning(true); setScanMsg(null);
    try{
      const dataUrl=await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=ev=>res(ev.target.result); r.onerror=rej; r.readAsDataURL(file); });
      const{date,time}=await readPontoFromImage(dataUrl);
      if(!date&&!time){ setScanMsg("Não encontrei data/hora na imagem."); setScanning(false); e.target.value=""; return; }
      let k=null;
      if(date){ const[dd,mm,yyyy]=date.split("/").map(Number); if(dd&&mm&&yyyy) k=dkey(yyyy,mm-1,dd); }
      if(!k){ const n=new Date(); k=dkey(n.getFullYear(),n.getMonth(),n.getDate()); }
      if(time){
        const[ky,km,kd]=k.split("-").map(Number);
        const wk=new Date(ky,km-1,kd).getDay(), isSat=wk===6;
        const order=isSat?["entrada","saida"]:["entrada","saidaAlmoco","voltaAlmoco","saida"];
        let filled=null;
        setDayData(prev=>{
          const cur=JSON.parse(JSON.stringify(prev[k]||{type:"normal",e:{}})); cur.e=cur.e||{};
          for(const f of order){ if(!cur.e[f]){ cur.e[f]=time; filled=f; break; } }
          return{...prev,[k]:cur};
        });
        const labels={entrada:"Entrada",saidaAlmoco:"Saída almoço",voltaAlmoco:"Retorno almoço",saida:"Saída"};
        setScanMsg(filled?`✓ ${date||"hoje"} — ${labels[filled]||filled}: ${time}`:`Imagem lida (${date} ${time}) — campos já preenchidos.`);
      } else {
        setScanMsg(`Data lida: ${date}. Sem horário identificado.`);
      }
    }catch(err){ setScanMsg("Erro: "+err.message); }
    setScanning(false); e.target.value="";
  }

  const days=Array.from({length:numDays},(_,i)=>i+1);

  return (
    <main className="max-w-md mx-auto px-4 py-4 space-y-4">

      {/* Calendar */}
      <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-4" style={{backgroundColor:"rgba(24,27,32,0.9)"}}>
        <div className="flex items-center justify-between mb-3">
          <button onClick={prevMon} className="p-1.5 rounded-lg hover:bg-zinc-800 text-zinc-400 transition"><ChevLeft size={16}/></button>
          <h2 className="text-sm font-bold text-zinc-100">{MONTHS[month]} <span className="text-zinc-500 font-medium">{year}</span></h2>
          <div className="flex items-center gap-1">
            <ColorDot onChange={applyColor} title="Cor dos dias úteis"/>
            <button onClick={nextMon} className="p-1.5 rounded-lg hover:bg-zinc-800 text-zinc-400 transition"><ChevRight size={16}/></button>
          </div>
        </div>
        <div className="grid grid-cols-7 gap-1 text-center mb-1">
          {WSHORT.map(w=><div key={w} className="text-xs font-bold text-zinc-500">{w}</div>)}
        </div>
        <div className="grid grid-cols-7 gap-1">
          {cells.map((c,i)=>{
            if(c.out) return <div key={i} className="aspect-square flex items-center justify-center text-xs text-zinc-700">{c.d>0?c.d:""}</div>;
            const k=dkey(year,month,c.d), dd=getDay(k);
            const wk=(wd1st+(c.d-1))%7, isSun=wk===0, isSat=wk===6;
            const isToday=c.d===today.getDate()&&month===today.getMonth()&&year===today.getFullYear();
            const isFer=dd.type==="feriado", isFol=dd.type==="folga"||isSun;
            const hasOt=!isFer&&!isFol&&hasAny(dd.e||{})&&otM(dd.e||{},isSat)>0;
            let cls="text-zinc-300 hover:bg-zinc-800";
            if(isFer) cls="bg-red-500/20 text-red-400";
            else if(isFol) cls="text-zinc-600 bg-zinc-800/50";
            else if(isSat) cls="text-emerald-400";
            if(isToday) cls="bg-emerald-400 text-zinc-900 font-extrabold";
            return (
              <button key={i}
                onClick={()=>{ if(!isSun) toggleType(k,"feriado"); }}
                onContextMenu={e=>{ e.preventDefault(); if(!isSun) toggleType(k,"folga"); }}
                className={`relative aspect-square rounded-lg text-sm font-semibold flex items-center justify-center transition ${cls}`}>
                {c.d}
                {hasOt&&<span className="absolute top-0.5 right-0.5 w-1.5 h-1.5 rounded-full bg-emerald-400"/>}
              </button>
            );
          })}
        </div>
        <div className="flex flex-wrap gap-x-4 gap-y-1 mt-3 text-xs text-zinc-500">
          <span className="flex items-center gap-1.5"><span className="w-2 h-2 rounded-full bg-zinc-600 inline-block"/>Fim de Semana</span>
          <span className="flex items-center gap-1.5"><span className="w-2 h-2 rounded-full bg-red-400 inline-block"/>Feriado</span>
          <span className="flex items-center gap-1.5"><span className="w-2 h-2 rounded-full bg-emerald-400 inline-block"/>Hoje</span>
          <span className="flex items-center gap-1.5"><span className="w-2 h-2 rounded-full bg-emerald-500/50 inline-block"/>Sábado útil</span>
        </div>
        <p className="text-xs text-zinc-600 mt-1.5">Toque: feriado · Toque longo/clique direito: folga</p>
      </div>

      {/* Scanner */}
      <div>
        <button onClick={()=>scanRef.current?.click()} disabled={scanning}
          className="w-full flex items-center justify-center gap-2 py-3 rounded-2xl bg-zinc-900 border border-zinc-800 text-sm font-bold text-zinc-200 hover:bg-zinc-800 transition disabled:opacity-50">
          <ScanIco size={16} className={scanning?"text-emerald-400":"text-zinc-400"}/>
          {scanning?"Analisando imagem com IA...":"Escanear ponto"}
        </button>
        <input ref={scanRef} type="file" accept="image/*" capture="environment" className="hidden" onChange={handleScanFile}/>
        {scanMsg&&<p className={`text-xs font-semibold mt-2 px-1 ${scanMsg.startsWith("✓")?"text-emerald-400":"text-zinc-400"}`}>{scanMsg}</p>}
      </div>

      {/* Resumo */}
      <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-4" style={{backgroundColor:"rgba(24,27,32,0.9)"}}>
        <div className="flex items-center justify-between mb-3">
          <h3 className="text-xs font-bold uppercase tracking-widest text-zinc-400">Resumo do mês</h3>
          <div className="flex items-center gap-1 text-xs text-zinc-500">
            H.extra:&nbsp;
            {editOT
              ? <input autoFocus type="number" step="0.01" value={overtime}
                  onChange={e=>setOvertime(Number(e.target.value))}
                  onBlur={()=>setEditOT(false)}
                  onKeyDown={e=>e.key==="Enter"&&setEditOT(false)}
                  className="w-16 bg-zinc-800 border border-zinc-700 rounded px-1.5 py-0.5 text-right outline-none text-zinc-100"/>
              : <button onClick={()=>setEditOT(true)} className="text-zinc-200 underline decoration-dotted">R$ {overtime.toFixed(2)}</button>
            }
          </div>
        </div>
        <div className="grid grid-cols-2 gap-2.5">
          <SCard icon={<Clock size={13}/>}      label="TRABALHADAS"   value={fmtHM(summ.worked)} sub={`${summ.days} dias`}                  tone="neutral"/>
          <SCard icon={<TrendUp size={13}/>}    label="HORAS EXTRAS"  value={fmtHM(summ.ot)}     sub={fmtBRL(otMon)}                         tone="pos"/>
          <SCard icon={<TrendDown size={13}/>}  label="HORAS DEVIDAS" value={fmtHM(summ.owed)}   sub={`-${fmtBRL(owedMon)}`}                 tone="neg"/>
          <SCard icon={<CardIco size={13}/>}    label="SALDO"         value={`${balMin>=0?"+":""}${fmtHM(balMin)}`} sub={`${balMon>=0?"+":""}${fmtBRL(balMon)}`} tone={balMin>=0?"pos":"neg"}/>
        </div>
      </div>

      {/* Apontamentos */}
      <div>
        <h3 className="text-xs font-bold uppercase tracking-widest text-zinc-400 mb-2">Apontamentos diários</h3>
        <div className="space-y-2">
          {days.map(d=>{
            const k=dkey(year,month,d), dd=getDay(k);
            const wk=new Date(year,month,d).getDay(), isSun=wk===0, isSat=wk===6;
            const isFer=dd.type==="feriado", isFol=dd.type==="folga"||isSun;
            const e=dd.e||{}, w=workedM(e,isSat), ot=otM(e,isSat), ow=owedM(e,isSat);
            const otMon2=(ot/60)*overtime;
            const color=dd.color;
            const isToday=d===today.getDate()&&month===today.getMonth()&&year===today.getFullYear();

            let badge=null;
            if(!isFer&&!isFol){
              if(hasAny(e)&&ot>0)
                badge=<span className="flex items-center gap-1 text-xs font-bold text-emerald-400 px-2.5 py-1 rounded-full" style={{background:"rgba(52,211,153,0.1)"}}><TrendUp size={12}/> +{fmtHM(ot)}</span>;
              else if(hasAny(e)&&ow>0)
                badge=<span className="flex items-center gap-1 text-xs font-bold text-red-400 px-2.5 py-1 rounded-full" style={{background:"rgba(248,113,113,0.1)"}}><TrendDown size={12}/> -{fmtHM(ow)}</span>;
              else if(hasAny(e))
                badge=<span className="text-xs font-bold text-zinc-400 px-2.5 py-1 rounded-full bg-zinc-800">— {fmtHM(expM(isSat))}</span>;
            }

            const cardStyle=color&&!isFer?{backgroundColor:color+"0d"}:{};

            let numClass="bg-zinc-800 text-zinc-100";
            let numStyle={};
            if(isFer){ numClass="text-red-400"; numStyle={backgroundColor:"rgba(239,68,68,0.15)"}; }
            else if(isToday){ numClass="text-zinc-900 font-extrabold"; numStyle={backgroundColor:"#34d399",boxShadow:"0 0 12px rgba(52,211,153,0.3)"}; }
            else if(color){ numStyle={backgroundColor:color+"22",color}; numClass=""; }

            return (
              <div key={k} className="rounded-2xl border border-zinc-800 p-4 bg-zinc-900" style={{...cardStyle,backgroundColor:cardStyle.backgroundColor||"rgba(24,27,32,0.8)"}}>
                <div className="flex items-center justify-between mb-4">
                  <div className="flex items-center gap-3">
                    <div className={`w-11 h-11 rounded-xl flex items-center justify-center text-base font-extrabold flex-shrink-0 ${numClass}`} style={numStyle}>
                      {d}
                    </div>
                    <div className="flex items-center flex-wrap gap-x-2">
                      <span className={`text-base font-bold ${isToday?"text-emerald-300":"text-zinc-100"}`}>{WFULL[wk]}</span>
                      {isFer&&<span className="text-xs font-bold text-red-400">FERIADO</span>}
                      {!isFer&&isSun&&<span className="text-xs font-bold text-zinc-500">FIM DE SEMANA</span>}
                      {!isFer&&!isSun&&dd.type==="folga"&&<span className="text-xs font-bold text-zinc-500">FOLGA</span>}
                    </div>
                  </div>
                  {badge}
                </div>

                {(isFer||isFol)?(
                  <p className="text-sm text-zinc-600">Sem registro de ponto</p>
                ):isSat?(
                  <TimeRow icon={<Clock size={14}/>} label="AM" left={e.entrada} onLeft={v=>setT(k,"entrada",v)} right={e.saida} onRight={v=>setT(k,"saida",v)}/>
                ):(<>
                  <TimeRow icon={<Clock size={14}/>} label="AM" left={e.entrada} onLeft={v=>setT(k,"entrada",v)} right={e.saidaAlmoco} onRight={v=>setT(k,"saidaAlmoco",v)}/>
                  <div className="mt-2">
                    <TimeRow icon={<CoffeeIco size={14}/>} label="PM" left={e.voltaAlmoco} onLeft={v=>setT(k,"voltaAlmoco",v)} right={e.saida} onRight={v=>setT(k,"saida",v)}/>
                  </div>
                </>)}

                {!isFer&&!isFol&&hasAny(e)&&(
                  <div className="flex items-center gap-2 mt-3 text-sm text-zinc-400">
                    Total: <span className="text-zinc-100 font-bold">{fmtHM(w)}</span>
                    {ot>0&&<span className="text-emerald-400 font-bold">+{fmtBRL(otMon2)}</span>}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </main>
  );
}

function ColorDot({onChange,title}){
  const id=useRef("cd-"+Math.random().toString(36).slice(2));
  return (
    <label htmlFor={id.current}
      className="w-7 h-7 rounded-lg border border-zinc-700 hover:border-zinc-400 bg-zinc-800 flex items-center justify-center cursor-pointer transition"
      title={title}>
      <PaletteIco size={15} className="text-zinc-400"/>
      <input id={id.current} type="color" defaultValue="#4ade80"
        onChange={e=>onChange(e.target.value)} className="sr-only"/>
    </label>
  );
}

function SCard({icon,label,value,sub,tone}){
  const tc=tone==="pos"?"text-emerald-400":tone==="neg"?"text-red-400":"text-zinc-100";
  const bc=tone==="pos"?"border-emerald-500/20":tone==="neg"?"border-red-500/20":"border-zinc-800";
  const bg=tone==="pos"?"rgba(52,211,153,0.05)":tone==="neg"?"rgba(248,113,113,0.05)":"rgba(39,39,42,0.5)";
  return (
    <div className={`rounded-xl p-3 border ${bc}`} style={{backgroundColor:bg}}>
      <div className={`flex items-center gap-1.5 text-xs font-bold uppercase tracking-widest mb-1.5 ${tone==="pos"?"text-emerald-400":tone==="neg"?"text-red-400":"text-zinc-500"}`}>{icon}{label}</div>
      <p className={`text-lg font-extrabold ${tc}`}>{value}</p>
      <p className={`text-xs mt-0.5 ${tone==="neutral"?"text-zinc-500":tc}`}>{sub}</p>
    </div>
  );
}

function TimeRow({icon,label,left,onLeft,right,onRight}){
  return (
    <div className="flex items-center gap-2">
      <span className="flex items-center gap-1 text-zinc-500 text-xs w-9 flex-shrink-0">{icon}{label}</span>
      <TBox value={left} onChange={onLeft}/>
      <span className="text-zinc-600">—</span>
      <TBox value={right} onChange={onRight}/>
    </div>
  );
}
function TBox({value,onChange}){
  return (
    <input type="time" value={value||""} onChange={e=>onChange(e.target.value)}
      className="flex-1 bg-zinc-800 border border-zinc-700 rounded-xl px-2 py-2.5 text-sm font-bold text-center text-zinc-100 outline-none transition"
      style={{colorScheme:"dark"}}/>
  );
}

// ════════════ FINANÇAS TAB ═══════════════════════════════════════════════
function FinTab({finData,setFinData,globalPin,setGlobalPin}){
  const today=new Date();
  const [year,setYear]=useState(today.getFullYear());
  const [month,setMonth]=useState(today.getMonth());
  const mk=mkey(year,month);

  function prevMon(){ if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1); }
  function nextMon(){ if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1); }

  const sections=useMemo(()=>{
    if(finData[mk]) return finData[mk];
    if(globalPin) return globalPin.map(s=>({...s,items:s.items.map(it=>({...it,id:newId()}))}));
    return defSections();
  },[finData,mk,globalPin]);

  function updSections(fn){ setFinData(p=>({...p,[mk]:fn(JSON.parse(JSON.stringify(p[mk]||sections)))})); }
  function updSect(id,fn){ updSections(list=>list.map(s=>s.id===id?fn({...s}):s)); }
  function updItem(sid,iid,f,v){ updSect(sid,s=>({...s,items:s.items.map(it=>it.id===iid?{...it,[f]:v}:it)})); }
  function addItem(sid){ updSect(sid,s=>({...s,items:[...s.items,{id:newId(),label:"Novo item",value:0}]})); }
  function delItem(sid,iid){ updSect(sid,s=>({...s,items:s.items.filter(it=>it.id!==iid)})); }
  function updTitle(sid,t){ updSect(sid,s=>({...s,title:t})); }
  function updColor(sid,c){ updSect(sid,s=>({...s,color:c})); }
  function addSection(){ updSections(list=>[...list,{id:newId(),title:"Nova lista",color:"#38bdf8",kind:"expense",pin:false,items:[{id:newId(),label:"Item",value:0}]}]); }
  function delSection(sid){ updSections(list=>list.filter(s=>s.id!==sid)); }
  function togglePin(sid){
    const current=finData[mk]||sections;
    const updated=current.map(s=>s.id===sid?{...s,pin:!s.pin}:s);
    setFinData(p=>({...p,[mk]:updated}));
    const pinned=updated.filter(s=>s.pin);
    setGlobalPin(pinned.length>0?pinned:null);
  }

  function sum(items){ return items.reduce((a,it)=>a+(Number(it.value)||0),0); }

  const fixedSect=sections.find(s=>s.kind==="fixed");
  const fixedTotal=fixedSect?sum(fixedSect.items):0;
  const cardSect=sections.find(s=>s.kind==="card");
  const cardRaw=cardSect?sum(cardSect.items):0;
  const cardTotal=Math.max(0,cardRaw-fixedTotal);
  const totalIn=sections.filter(s=>s.kind==="income").reduce((a,s)=>a+sum(s.items),0);
  const totalOut=sections.reduce((a,s)=>{
    if(s.kind==="income") return a;
    if(s.kind==="card") return a+cardTotal;
    return a+sum(s.items);
  },0);
  const balance=totalIn-totalOut;

  return (
    <main className="max-w-md mx-auto px-4 py-4 space-y-3">
      <div className="flex items-center justify-between bg-zinc-900 border border-zinc-800 rounded-2xl px-3 py-2.5">
        <button onClick={prevMon} className="p-1.5 rounded-lg hover:bg-zinc-800 text-zinc-400 transition"><ChevLeft size={16}/></button>
        <span className="text-sm font-bold text-zinc-100">{MONTHS[month]} <span className="text-zinc-500 font-medium">{year}</span></span>
        <button onClick={nextMon} className="p-1.5 rounded-lg hover:bg-zinc-800 text-zinc-400 transition"><ChevRight size={16}/></button>
      </div>

      {sections.map(s=>{
        const isCard=s.kind==="card", total=isCard?cardTotal:sum(s.items), raw=isCard?cardRaw:null;
        return (
          <FinSection key={s.id} section={s} total={total} rawTotal={raw} fixedTotal={isCard?fixedTotal:0}
            onAddItem={()=>addItem(s.id)} onUpdItem={(iid,f,v)=>updItem(s.id,iid,f,v)} onDelItem={iid=>delItem(s.id,iid)}
            onTitle={t=>updTitle(s.id,t)} onColor={c=>updColor(s.id,c)} onPin={()=>togglePin(s.id)}
            onDel={["income","fixed","card"].includes(s.kind)?null:()=>delSection(s.id)}/>
        );
      })}

      <button onClick={addSection}
        className="w-full py-3 rounded-2xl border border-dashed border-zinc-700 text-xs font-semibold text-zinc-500 hover:text-zinc-300 hover:border-zinc-600 transition flex items-center justify-center gap-2">
        <PlusIco size={14}/> Adicionar seção personalizada
      </button>

      <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-4">
        <h3 className="text-xs font-bold uppercase tracking-widest text-zinc-400 mb-3">Resultado do mês</h3>
        <div className="grid grid-cols-3 gap-2">
          <ResCard icon={<TrendUp size={13}/>}   label="ENTRADAS" value={fmtBRL(totalIn)}  tone="pos"/>
          <ResCard icon={<TrendDown size={13}/>} label="SAÍDAS"   value={fmtBRL(totalOut)} tone="neg"/>
          <ResCard icon={<CardIco size={13}/>}   label="SALDO"    value={`${balance>=0?"+":""}${fmtBRL(balance)}`} tone={balance>=0?"pos":"neg"}/>
        </div>
      </div>
    </main>
  );
}

function FinSection({section,total,rawTotal,fixedTotal,onAddItem,onUpdItem,onDelItem,onTitle,onColor,onPin,onDel}){
  const [editTitle,setEditTitle]=useState(false);
  const c=section.color||"#6b7280";
  return (
    <div className="border border-zinc-800 rounded-2xl p-4" style={{backgroundColor:"rgba(24,27,32,0.85)"}}>
      <div className="flex items-center justify-between mb-3 gap-2">
        <div className="flex items-center gap-2 min-w-0 flex-1">
          <SectionColorPicker color={c} onChange={onColor}/>
          {editTitle
            ? <input autoFocus value={section.title} onChange={e=>onTitle(e.target.value)}
                onBlur={()=>setEditTitle(false)} onKeyDown={e=>e.key==="Enter"&&setEditTitle(false)}
                className="bg-transparent text-sm font-bold outline-none border-b border-zinc-600 text-zinc-100 flex-1 min-w-0"/>
            : <button onClick={()=>setEditTitle(true)} className="text-sm font-bold text-zinc-100 truncate text-left hover:text-zinc-300 transition">{section.title}</button>
          }
        </div>
        <div className="flex items-center gap-1.5 flex-shrink-0">
          <span className="text-sm font-extrabold" style={{color:c}}>{fmtBRL(total)}</span>
          <button onClick={onPin} title={section.pin?"Fixado para todos os meses":"Fixar para todos os meses"}
            className={`p-1.5 rounded-lg border transition ${section.pin?"bg-zinc-200 border-zinc-200 text-zinc-900":"border-zinc-700 text-zinc-500 hover:bg-zinc-800"}`}>
            {section.pin?<PinIco size={12}/>:<PinOffIco size={12}/>}
          </button>
          {onDel&&<button onClick={onDel} className="p-1.5 rounded-lg hover:bg-zinc-800 text-zinc-500 border border-zinc-700"><TrashIco size={12}/></button>}
        </div>
      </div>

      {section.kind==="card"&&fixedTotal>0&&(
        <p className="text-xs text-zinc-500 mb-2">Total lançado: {fmtBRL(rawTotal||0)} — descontado fixas: <span className="text-red-400">-{fmtBRL(fixedTotal)}</span></p>
      )}

      <div className="space-y-1.5">
        {section.items.map(it=>(
          <div key={it.id} className="flex items-center gap-2">
            <input value={it.label} onChange={e=>onUpdItem(it.id,"label",e.target.value)}
              className="flex-1 bg-zinc-950 border border-zinc-800 rounded-lg px-2.5 py-2 text-xs outline-none text-zinc-200" style={{background:"rgba(9,9,11,0.8)"}}/>
            <div className="flex items-center border border-zinc-800 rounded-lg overflow-hidden" style={{background:"rgba(9,9,11,0.8)"}}>
              <span className="text-xs text-zinc-500 pl-2 select-none">R$</span>
              <input type="number" value={it.value} onChange={e=>onUpdItem(it.id,"value",e.target.value)}
                className="w-20 bg-transparent px-1.5 py-2 text-xs text-right outline-none text-zinc-200"/>
            </div>
            <button onClick={()=>onDelItem(it.id)} className="p-1.5 rounded-lg hover:bg-zinc-800 text-zinc-500 flex-shrink-0"><XIco size={12}/></button>
          </div>
        ))}
      </div>
      <button onClick={onAddItem} className="mt-2.5 flex items-center gap-1.5 text-xs text-zinc-500 hover:text-zinc-300 transition font-semibold">
        <PlusIco size={12}/> Adicionar item
      </button>
    </div>
  );
}

function SectionColorPicker({color,onChange}){
  const id=useRef("cp-"+Math.random().toString(36).slice(2));
  return (
    <label htmlFor={id.current}
      className="w-5 h-5 rounded-full border-2 border-zinc-600 hover:border-zinc-300 transition flex-shrink-0 cursor-pointer block"
      style={{backgroundColor:color}}
      title="Alterar cor da seção">
      <input id={id.current} type="color" value={color}
        onChange={e=>onChange(e.target.value)} className="sr-only"/>
    </label>
  );
}

function ResCard({icon,label,value,tone}){
  const c=tone==="pos"?"text-emerald-400":"text-red-400";
  const bg=tone==="pos"?"rgba(52,211,153,0.05)":"rgba(248,113,113,0.05)";
  const bc=tone==="pos"?"border-emerald-500/20":"border-red-500/20";
  return (
    <div className={`rounded-xl p-2.5 border ${bc} text-center`} style={{backgroundColor:bg}}>
      <div className={`flex items-center justify-center gap-1 text-xs font-bold uppercase tracking-widest mb-1 ${c}`}>{icon}{label}</div>
      <p className={`text-sm font-extrabold ${c} break-all`}>{value}</p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
