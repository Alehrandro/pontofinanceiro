async function readPontoFromImage(dataUrl){
  var base64=dataUrl.split(",")[1];
  var mtype=dataUrl.split(";")[0].split(":")[1]||"image/jpeg";
  var res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:200,messages:[{role:"user",content:[
      {type:"image",source:{type:"base64",media_type:mtype,data:base64}},
      {type:"text",text:"Você é OCR de app de ponto. Extraia data e hora da batida do comprovante.\nIgnore CNPJ,PIS,NSR,NF,hashes. Foque na linha data+hora do evento.\nJSON puro: {\"date\":\"DD/MM/YYYY\",\"time\":\"HH:MM\"}"}
    ]}]})
  });
  if(!res.ok) throw new Error("API "+res.status);
  var data=await res.json();
  var text=(data.content||[]).find(function(b){return b.type==="text";});
  text=text?text.text:"";
  var m=text.match(/\{[\s\S]*?\}/);
  if(!m) throw new Error("Sem JSON");
  return JSON.parse(m[0]);
}

function App(){
  var s = {
    ready:     useState(false),
    user:      useState(null),
    tab:       useState("ponto"),
    dayData:   useState({}),
    overtime:  useState(15.55),
    finData:   useState({}),
    globalPin: useState(null),
    coverUrl:  useState(null),
    coverPath: useState(null),
    tick:      useState(0),
  };
  var ready=s.ready[0],     setReady=s.ready[1];
  var user=s.user[0],       setUser=s.user[1];
  var tab=s.tab[0],         setTab=s.tab[1];
  var dayData=s.dayData[0], setDayDataRaw=s.dayData[1];
  var overtime=s.overtime[0],setOvertimeRaw=s.overtime[1];
  var finData=s.finData[0], setFinDataRaw=s.finData[1];
  var globalPin=s.globalPin[0],setGlobalPinRaw=s.globalPin[1];
  var coverUrl=s.coverUrl[0],  setCoverUrl=s.coverUrl[1];
  var coverPath=s.coverPath[0],setCoverPath=s.coverPath[1];
  var tick=s.tick[0],          setTick=s.tick[1];

  var hist=useRef([]), fut=useRef([]), skip=useRef(false);
  var pendingDays=useRef({}), pendingMonths=useRef({}), pendingCfg=useRef(false);

  function snap(){ return {dayData:dayData,overtime:overtime,finData:finData,globalPin:globalPin}; }
  function pushH(){
    if(skip.current)return;
    hist.current.push(snap());
    if(hist.current.length>60) hist.current.shift();
    fut.current=[];
    setTick(function(t){return t+1;});
  }
  function applySnap(sn){
    skip.current=true;
    setDayDataRaw(sn.dayData); setOvertimeRaw(sn.overtime);
    setFinDataRaw(sn.finData); setGlobalPinRaw(sn.globalPin);
    skip.current=false;
    setTick(function(t){return t+1;});
  }
  function undo(){ var p=hist.current.pop(); if(!p)return; fut.current.push(snap()); applySnap(p); }
  function redo(){ var n=fut.current.pop(); if(!n)return; hist.current.push(snap()); applySnap(n); }

  function setDayData(u){
    pushH();
    setDayDataRaw(function(prev){
      var next=typeof u==="function"?u(prev):u;
      Object.keys(next).forEach(function(k){ if(JSON.stringify(next[k])!==JSON.stringify(prev[k])) pendingDays.current[k]=true; });
      return next;
    });
  }
  function setFinData(u){
    pushH();
    setFinDataRaw(function(prev){
      var next=typeof u==="function"?u(prev):u;
      Object.keys(next).forEach(function(k){ if(JSON.stringify(next[k])!==JSON.stringify(prev[k])) pendingMonths.current[k]=true; });
      return next;
    });
  }
  function setOvertime(v){ pushH(); setOvertimeRaw(v); pendingCfg.current=true; }
  function setGlobalPin(v){ pushH(); setGlobalPinRaw(v); pendingCfg.current=true; }

  useEffect(function(){
    dbLoad().then(function(data){
      if(data){
        skip.current=true;
        setDayDataRaw(data.dayData||{});
        setFinDataRaw(data.finData||{});
        setOvertimeRaw(data.overtime);
        setGlobalPinRaw(data.globalPin);
        skip.current=false;
        if(data.coverUrl)  setCoverUrl(data.coverUrl);
        if(data.coverPath) setCoverPath(data.coverPath);
        setUser({name:"Admin"});
      }
      setReady(true);
    });
  },[]);

  useEffect(function(){
    var t=setInterval(function(){
      var dd=Object.assign({},pendingDays.current);
      var mm=Object.assign({},pendingMonths.current);
      var cc=pendingCfg.current;
      pendingDays.current={}; pendingMonths.current={}; pendingCfg.current=false;
      var p=[];
      Object.keys(dd).forEach(function(k){ var d=dayData[k]; if(d) p.push(dbSaveDay(k,d)); });
      Object.keys(mm).forEach(function(k){ var s=finData[k]; if(s) p.push(dbSaveMonth(k,s)); });
      if(cc) p.push(dbSaveConfig(overtime,globalPin));
      if(p.length) Promise.all(p).catch(function(e){console.error("flush:",e);});
    },1500);
    return function(){ clearInterval(t); };
  },[dayData,finData,overtime,globalPin]);

  if(!ready) return h("div",{className:"min-h-screen bg-[#111318] flex flex-col items-center justify-center gap-3"},
    h(LoaderIcon,{size:28,className:"text-emerald-400",style:{animation:"spin 1s linear infinite"}}),
    h("p",{className:"text-zinc-500 text-sm"},"Conectando ao Supabase...")
  );

  if(!user) return h(LoginScreen,{
    onLogin:function(){ setUser({name:"Admin"}); },
    coverUrl:coverUrl, coverPath:coverPath,
    onCoverChange:function(url,path){ setCoverUrl(url); setCoverPath(path); },
    onCoverRemove:function(){ setCoverUrl(null); setCoverPath(null); }
  });

  return h("div",{className:"min-h-screen bg-[#111318] text-zinc-100 pb-12"},
    // Header
    h("div",{className:"sticky top-0 z-30 border-b border-zinc-800 px-4 pt-5 pb-3 flex items-center justify-between",
      style:{backgroundColor:"rgba(17,19,24,0.97)",backdropFilter:"blur(8px)"}},
      h("div",null,
        h("div",{className:"text-base font-bold leading-none"},"Ponto & Finanças"),
        h("div",{className:"flex items-center gap-1 text-xs text-zinc-500 mt-0.5"},
          h(ShieldIcon,{size:10,className:"text-emerald-400"}),"Admin",
          h("span",{className:"text-zinc-700"},"·"),
          h("span",{className:"text-emerald-600 text-[10px]"},"● Supabase")
        )
      ),
      h("div",{className:"flex items-center gap-1.5"},
        h("div",{className:"flex bg-zinc-900 border border-zinc-800 rounded-full p-0.5"},
          h("button",{onClick:undo,disabled:!hist.current.length,className:"p-1.5 text-zinc-400 hover:text-white disabled:opacity-25 transition rounded-full"},h(UndoIcon,{size:14})),
          h("button",{onClick:redo,disabled:!fut.current.length, className:"p-1.5 text-zinc-400 hover:text-white disabled:opacity-25 transition rounded-full"},h(RedoIcon,{size:14}))
        ),
        h("div",{className:"flex bg-zinc-900 border border-zinc-800 rounded-full p-0.5"},
          h(TabBtn,{active:tab==="ponto",    onClick:function(){setTab("ponto");},    label:"Ponto",    icon:h(ClockIcon,{size:12})}),
          h(TabBtn,{active:tab==="financas", onClick:function(){setTab("financas");}, label:"Finanças", icon:h(WalletIcon,{size:12})})
        ),
        h("button",{onClick:function(){setUser(null);},className:"p-2 rounded-full bg-zinc-900 border border-zinc-800 text-zinc-500 hover:text-white transition"},h(LogOutIcon,{size:13}))
      )
    ),
    // Tab content
    tab==="ponto"

  function updDay(k,fn){
    setDayData(function(prev){
      var cur=JSON.parse(JSON.stringify(prev[k]||{type:"normal",e:{}}));
      return Object.assign({},prev,{[k]:fn(cur)});
    });
  }
  function toggleType(k,t){ updDay(k,function(dd){dd.type=dd.type===t?"normal":t;return dd;}); }

    var a=toMin(e.entrada),b=toMin(e.saidaAlmoco),c=toMin(e.voltaAlmoco),d=toMin(e.saida);

  function hasAny(e){return !!(e&&(e.entrada||e.saidaAlmoco||e.voltaAlmoco||e.saida));}

            !isFer&&!isFol&&hasAny(e)&&h("div",{className:"flex items-center gap-2 mt-3 text-sm text-zinc-400"},
              "Total: ",h("span",{className:"text-zinc-100 font-bold"},fmtHM(w)),
              ot>0&&h("span",{className:"text-emerald-400 font-bold"},"+"+fmtBRL(otMon2))
            )
          );
        })
      )
    )
  );
}

function TBox(props){

    style:{colorScheme:"dark"}});

// ════════════ FINANÇAS TAB ════════════════════════════════════════════════════
function FinTab(props){
  var finData=props.finData, setFinData=props.setFinData;
  var globalPin=props.globalPin, setGlobalPin=props.setGlobalPin;
  var today=new Date();
  var yr=useState(today.getFullYear()), setYear=yr[1]; yr=yr[0];
  var mo=useState(today.getMonth()),    setMonth=mo[1]; mo=mo[0];
  var mk=mkey(yr,mo);

  function prevMon(){if(mo===0){setMonth(11);setYear(function(y){return y-1;});}else setMonth(function(m){return m-1;});}
  function nextMon(){if(mo===11){setMonth(0);setYear(function(y){return y+1;});}else setMonth(function(m){return m+1;});}

  var sections=useMemo(function(){
    if(finData[mk]) return finData[mk];
    if(globalPin) return globalPin.map(function(s){return Object.assign({},s,{items:s.items.map(function(it){return Object.assign({},it,{id:newId("it")});})});});
    return defSections();
  },[finData,mk,globalPin]);

  function withSections(fn){
    setFinData(function(prev){
      var base=prev[mk]?prev[mk]:sections;
      var next=fn(base);
      return Object.assign({},prev,{[mk]:next});
    });
  }
  function updSect(id,fn){ withSections(function(list){return list.map(function(s){return s.id===id?fn(s):s;}); }); }
  function updItem(sid,iid,f,v){ updSect(sid,function(s){return Object.assign({},s,{items:s.items.map(function(it){return it.id===iid?Object.assign({},it,{[f]:v}):it;})});}); }
  function addItem(sid){ updSect(sid,function(s){return Object.assign({},s,{items:[].concat(s.items,[{id:newId("it"),label:"Novo item",value:0}])});}); }
  function delItem(sid,iid){ updSect(sid,function(s){return Object.assign({},s,{items:s.items.filter(function(it){return it.id!==iid;})});}); }
  function updTitle(sid,t){ updSect(sid,function(s){return Object.assign({},s,{title:t});}); }
  function updColor(sid,c){ updSect(sid,function(s){return Object.assign({},s,{color:c});}); }
  function addSection(){ withSections(function(list){return list.concat([{id:newId("sec"),title:"Nova lista",color:"#38bdf8",kind:"expense",pin:false,items:[{id:newId("it"),label:"Item",value:0}]}]);}); }
  function delSection(sid){ withSections(function(list){return list.filter(function(s){return s.id!==sid;}); }); }
  function togglePin(sid){
    withSections(function(list){
      var updated=list.map(function(s){return s.id===sid?Object.assign({},s,{pin:!s.pin}):s;});
      var pinned=updated.filter(function(s){return s.pin;});
      setGlobalPin(pinned.length>0?pinned:null);
      return updated;
    });
  }

  function sum(items){ return items.reduce(function(a,it){return a+(Number(it.value)||0);},0); }
  var fixedSect=sections.find(function(s){return s.kind==="fixed";}),  fixedTotal=fixedSect?sum(fixedSect.items):0;
  var cardSect=sections.find(function(s){return s.kind==="card";}),    cardRaw=cardSect?sum(cardSect.items):0;
  var cardTotal=Math.max(0,cardRaw-fixedTotal);
  var totalIn=sections.filter(function(s){return s.kind==="income";}).reduce(function(a,s){return a+sum(s.items);},0);
  var totalOut=sections.reduce(function(a,s){
    if(s.kind==="income")return a;
    if(s.kind==="card")return a+cardTotal;
    return a+sum(s.items);
  },0);
  var balance=totalIn-totalOut;

  return h("main",{className:"max-w-md mx-auto px-4 py-4 space-y-3"},
    h("div",{className:"flex items-center justify-between rounded-2xl px-3 py-2.5 border border-zinc-800",style:{backgroundColor:"rgba(24,27,32,0.9)"}},
      h("button",{onClick:prevMon,className:"p-1.5 rounded-lg hover:bg-zinc-800 text-zinc-400 transition"},h(ChevLeft,{size:16})),
      h("span",{className:"text-sm font-bold text-zinc-100"},MONTHS[mo]," ",h("span",{className:"text-zinc-500 font-medium"},yr)),
      h("button",{onClick:nextMon,className:"p-1.5 rounded-lg hover:bg-zinc-800 text-zinc-400 transition"},h(ChevRight,{size:16}))
    ),
    sections.map(function(s){
      var isCard=s.kind==="card", total=isCard?cardTotal:sum(s.items), raw=isCard?cardRaw:null;
      return h(FinSection,{key:s.id,section:s,total:total,rawTotal:raw,fixedTotal:isCard?fixedTotal:0,
        onAddItem:function(){addItem(s.id);},
        onUpdItem:function(iid,f,v){updItem(s.id,iid,f,v);},
        onDelItem:function(iid){delItem(s.id,iid);},
        onTitle:function(t){updTitle(s.id,t);},
        onColor:function(c){updColor(s.id,c);},
        onPin:function(){togglePin(s.id);},
        onDel:["income","fixed","card"].includes(s.kind)?null:function(){delSection(s.id);}
      });
    }),
    h("button",{onClick:addSection,className:"w-full py-3 rounded-2xl border border-dashed border-zinc-700 text-xs font-semibold text-zinc-500 hover:text-zinc-300 hover:border-zinc-600 transition flex items-center justify-center gap-2"},
      h(PlusIcon,{size:14}),"Adicionar seção personalizada"),
    h("div",{className:"rounded-2xl p-4 border border-zinc-800",style:{backgroundColor:"rgba(24,27,32,0.9)"}},
      h("h3",{className:"text-xs font-bold uppercase tracking-widest text-zinc-400 mb-3"},"Resultado do mês"),
      h("div",{className:"grid grid-cols-3 gap-2"},
        h(ResCard,{icon:h(TrendUp,{size:13}),   label:"ENTRADAS",value:fmtBRL(totalIn), tone:"pos"}),
        h(ResCard,{icon:h(TrendDown,{size:13}), label:"SAÍDAS",  value:fmtBRL(totalOut),tone:"neg"}),
        h(ResCard,{icon:h(CardIcon,{size:13}),  label:"SALDO",   value:(balance>=0?"+":"")+fmtBRL(balance),tone:balance>=0?"pos":"neg"})
      )
    )
  );
}

function FinSection(props){
  var s=props.section, c=s.color||"#6b7280";
  var editT=useState(false), setEditT=editT[1]; editT=editT[0];
  var draft=useState(s.title), setDraft=draft[1]; draft=draft[0];
  useEffect(function(){setDraft(s.title);},[s.title]);
  return h("div",{className:"rounded-2xl p-4 border border-zinc-800",style:{backgroundColor:"rgba(24,27,32,0.85)"}},
    h("div",{className:"flex items-center justify-between mb-3 gap-2"},
      h("div",{className:"flex items-center gap-2 min-w-0 flex-1"},
        h(SectionColorPicker,{color:c,onChange:props.onColor}),
        editT
          ? h("input",{autoFocus:true,value:draft,onChange:function(e){setDraft(e.target.value);},
              onBlur:function(){props.onTitle(draft.trim()||s.title);setEditT(false);},
              onKeyDown:function(e){if(e.key==="Enter"){props.onTitle(draft.trim()||s.title);setEditT(false);}},
              className:"bg-transparent text-sm font-bold outline-none border-b border-zinc-600 text-zinc-100 flex-1 min-w-0"})
          : h("button",{onClick:function(){setDraft(s.title);setEditT(true);},className:"text-sm font-bold text-zinc-100 truncate text-left hover:text-zinc-300 transition"},s.title)
      ),
      h("div",{className:"flex items-center gap-1.5 flex-shrink-0"},
        h("span",{className:"text-sm font-extrabold",style:{color:c}},fmtBRL(props.total)),
        h("button",{onClick:props.onPin,title:s.pin?"Fixado para todos os meses":"Fixar para todos os meses",
          className:"p-1.5 rounded-lg border transition "+(s.pin?"bg-zinc-200 border-zinc-200 text-zinc-900":"border-zinc-700 text-zinc-500 hover:bg-zinc-800")},
          s.pin?h(PinIcon,{size:12}):h(PinOffIcon,{size:12})),
        props.onDel&&h("button",{onClick:props.onDel,className:"p-1.5 rounded-lg hover:bg-zinc-800 text-zinc-500 border border-zinc-700"},h(TrashIcon,{size:12}))
      )
    ),
    s.kind==="card"&&props.fixedTotal>0&&h("p",{className:"text-xs text-zinc-500 mb-2"},
      "Lançado: "+fmtBRL(props.rawTotal||0)+" — fixas: ",h("span",{className:"text-red-400"},"-"+fmtBRL(props.fixedTotal))),
    h("div",{className:"space-y-1.5"},
      s.items.map(function(it){ return h(FinItemRow,{key:it.id,item:it,onUpdate:props.onUpdItem,onDelete:props.onDelItem}); })
    ),
    h("button",{onClick:props.onAddItem,className:"mt-2.5 flex items-center gap-1.5 text-xs text-zinc-500 hover:text-zinc-300 transition font-semibold"},
      h(PlusIcon,{size:12}),"Adicionar item")
  );
}

function FinItemRow(props){
  var it=props.item;
  return h("div",{className:"flex items-center gap-2"},
    h("input",{value:it.label,placeholder:"Descrição",onChange:function(e){props.onUpdate(it.id,"label",e.target.value);},
      className:"flex-1 rounded-lg px-2.5 py-2 text-xs outline-none text-zinc-200 border border-zinc-800",style:{background:"rgba(9,9,11,0.8)"}}),
    h("div",{className:"flex items-center rounded-lg overflow-hidden border border-zinc-800",style:{background:"rgba(9,9,11,0.8)"}},
      h("span",{className:"text-xs text-zinc-500 pl-2 select-none"},"R$"),
      h("input",{type:"number",placeholder:"0",value:it.value===0?"":it.value,
        onChange:function(e){props.onUpdate(it.id,"value",e.target.value===""?0:Number(e.target.value));},
        className:"w-20 bg-transparent px-1.5 py-2 text-xs text-right outline-none text-zinc-200"})
    ),
    h("button",{onClick:function(){props.onDelete(it.id);},className:"p-1.5 rounded-lg hover:bg-zinc-800 text-zinc-500 flex-shrink-0"},h(XIcon,{size:12}))
  );
}

function SectionColorPicker(props){
  var idRef=useRef("cp-"+Math.random().toString(36).slice(2));
  return h("label",{htmlFor:idRef.current,
    className:"w-5 h-5 rounded-full border-2 border-zinc-600 hover:border-zinc-300 transition flex-shrink-0 cursor-pointer",
    style:{backgroundColor:props.color},title:"Cor da seção"},
    h("input",{id:idRef.current,type:"color",value:props.color,
      onChange:function(e){props.onChange(e.target.value);},
      style:{position:"absolute",opacity:0,width:1,height:1,pointerEvents:"none"}})
  );

function ResCard(props){
  var c=props.tone==="pos"?"text-emerald-400":"text-red-400";
  var bg=props.tone==="pos"?"rgba(52,211,153,0.05)":"rgba(248,113,113,0.05)";
  var bc=props.tone==="pos"?"border-emerald-500/20":"border-red-500/20";
  return h("div",{className:"rounded-xl p-2.5 border "+bc+" text-center",style:{backgroundColor:bg}},
    h("div",{className:"flex items-center justify-center gap-1 text-xs font-bold uppercase tracking-widest mb-1 "+c},props.icon,props.label),
    h("p",{className:"text-sm font-extrabold "+c+" truncate"},props.value)
  );
}
